name: Build, Push to ACR, and Deploy to Container App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY_LOGIN_SERVER: fairshareapicontainer-gnc0akckh4ergvaa.azurecr.io
  IMAGE_NAME: fairsharebackend
  CONTAINER_APP_NAME: fairshareapi
  RESOURCE_GROUP: Fair-Share_group

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Azure Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY_LOGIN_SERVER }}
        username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
        password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./src/api/Fair-Share.Api/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

    - name: Log in to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure Container App
      uses: azure/container-apps-deploy-action@v1
      with:
        imageToDeploy: ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        containerAppName: ${{ env.CONTAINER_APP_NAME }}
        resourceGroup: ${{ env.RESOURCE_GROUP }}
        registryUrl: ${{ env.REGISTRY_LOGIN_SERVER }}
        registryUsername: ${{ secrets.AZURE_REGISTRY_USERNAME }}
        registryPassword: ${{ secrets.AZURE_REGISTRY_PASSWORD }}